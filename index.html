<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>HomeVision — Document Review</title>
    <meta name="description" content="Compliance document review tool: triage annotated issues by severity, track resolution progress, and submit or re-upload documents with confidence." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="HomeVision — Document Review" />
    <meta property="og:description" content="Compliance document review tool: triage annotated issues by severity, track resolution progress, and submit or re-upload documents with confidence." />
    <meta property="og:url" content="https://mfigueira.github.io/hv-document-review/" />
    <meta property="og:image" content="https://mfigueira.github.io/hv-document-review/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HomeVision — Document Review" />
    <meta name="twitter:description" content="Compliance document review tool: triage annotated issues by severity, track resolution progress, and submit or re-upload documents." />
    <meta name="twitter:image" content="https://mfigueira.github.io/hv-document-review/og-image.png" />
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Restores the real URL from the query string set by 404.html so that
      // React Router sees the correct path on a deep link or refresh.
      (function () {
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
