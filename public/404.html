<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Saves the current URL to sessionStorage and redirects to the base index,
      // which restores the URL client-side so React Router handles it correctly.
      sessionStorage.redirect = location.href;
    </script>
    <meta http-equiv="refresh" content="0;URL='/hv-document-review/'" />
  </head>
  <body></body>
</html>
